<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과천중앙고등학교 시간표</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #f8fafc; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #1565C0; color: white; padding: 30px 20px; text-align: center; }
        .section { margin: 40px 0; }
        h2 { color: #1565C0; border-bottom: 3px solid #1976D2; padding-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card-header {
            background: #1565C0;
            color: white;
            padding: 12px 16px;
            font-weight: 600;
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>🏫 과천중앙고등학교 시간표</h1>
        <p>2026학년도 • 실제 시간표 표시</p>
    </header>

    <div class="container">
        <!-- Master Timetable -->
        <div class="section">
            <h2>📋 전체 시간표 (Master)</h2>
            <div style="background:white; padding:20px; border-radius:16px; text-align:center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <p><strong>⚠️ 전체 시간표 이미지를 assets/master/ 폴더에 업로드해 주세요.</strong></p>
                <p style="color:#64748b; font-size:0.9rem;">이미지를 업로드하면 여기에 바로 표시됩니다.</p>
            </div>
        </div>

        <!-- Teachers -->
        <div class="section">
            <h2>👩‍🏫 교사 시간표 (49명)</h2>
            <div class="grid" id="teachers-grid">
                <p style="grid-column:1/-1; text-align:center; color:#64748b;">
                    assets/teachers/ 폴더에 PNG 이미지를 업로드하면 시간표가 바로 보입니다.
                </p>
            </div>
        </div>

        <!-- Classes -->
        <div class="section">
            <h2>🏫 학년별 시간표</h2>
            <div class="grid" id="classes-grid">
                <p style="grid-column:1/-1; text-align:center; color:#64748b;">
                    assets/classes/ 폴더에 PNG 이미지를 업로드하면 시간표가 바로 보입니다.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
